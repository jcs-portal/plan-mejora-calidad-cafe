<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#2C1810" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Plan de Mejora" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="description" content="Plan de mejora de calidad de café para productores de San Adolfo, Huila · Ubuntu Café" />
  <title>Plan de Mejora de Calidad · Ubuntu Café</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://unpkg.com/docx@9.7.1/dist/index.umd.cjs"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overscroll-behavior: none; }
    body { background: #F5EDD8; font-family: -apple-system, 'Segoe UI', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }

    input, select, textarea { font-size: 16px !important; font-family: inherit; }
    input[type=number] { -moz-appearance: textfield; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }

    button { min-height: 44px; touch-action: manipulation; -webkit-appearance: none; cursor: pointer; }

    .scroll-area { -webkit-overflow-scrolling: touch; overflow-y: auto; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .seccion { animation: fadeIn 0.25s ease; }

    .header-safe { padding-top: max(18px, env(safe-area-inset-top)); }
    .nav-safe { padding-bottom: max(12px, env(safe-area-inset-bottom)); }

    /* Kanban: 3 columnas con scroll horizontal y snap, pensado para deslizar con el dedo */
    .kanban {
      display: flex; gap: 12px; overflow-x: auto; scroll-snap-type: x mandatory;
      padding-bottom: 8px; -webkit-overflow-scrolling: touch;
    }
    .kanban-col { flex: 0 0 86%; scroll-snap-align: start; max-width: 340px; }

    /* Impresión: una sola página apaisada, solo se ve el bloque .imprimir-pagina */
    .imprimir-pagina { display: none; }
    @media print {
      @page { size: landscape; margin: 10mm; }
      body * { visibility: hidden; }
      .imprimir-pagina, .imprimir-pagina * { visibility: visible; }
      .imprimir-pagina {
        display: block; position: absolute; left: 0; top: 0; width: 100%;
      }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback, useEffect, useRef, useMemo } = React;

// Mismo backend y mismos códigos que diagnostico-finca-cafe / finanzas-cafeteros (Railway)
const API_BASE = "https://doc-comite-finanzas-production.up.railway.app/api";

// Si la respuesta no es JSON (ej. la ruta todavía no existe en el backend y cae en el
// catch-all que sirve el HTML de finanzas-cafeteros), lanza un error claro en vez de
// romper en .json(). Esto evita pantallas en blanco cuando el backend no está al día.
async function parsearRespuesta(r) {
  const tipo = r.headers.get("content-type") || "";
  if (!tipo.includes("application/json")) {
    throw new Error(`Esta función todavía no está disponible en el servidor (ruta ${new URL(r.url).pathname}). Pide que se despliegue el backend actualizado.`);
  }
  const datos = await r.json();
  if (!r.ok) throw new Error(datos?.error || "Error de conexión");
  return datos;
}
// Contraseña opcional por código (asignada por el formador). Se envía en todas
// las peticiones; si el código no tiene contraseña asignada, el backend la ignora.
let currentPassword = localStorage.getItem("pmcc_password") || "";
function setCurrentPassword(p) { currentPassword = p || ""; localStorage.setItem("pmcc_password", currentPassword); }

async function apiGet(ruta, code) {
  const r = await fetch(API_BASE + ruta, { headers: { "X-Code": code, "X-Password": currentPassword } });
  return parsearRespuesta(r);
}
async function apiPut(ruta, code, body) {
  const r = await fetch(API_BASE + ruta, {
    method: "PUT",
    headers: { "Content-Type": "application/json", "X-Code": code, "X-Password": currentPassword },
    body: JSON.stringify(body)
  });
  return parsearRespuesta(r);
}
async function apiPost(ruta, code, body) {
  const r = await fetch(API_BASE + ruta, {
    method: "POST",
    headers: { "Content-Type": "application/json", "X-Code": code, "X-Password": currentPassword },
    body: JSON.stringify(body)
  });
  return parsearRespuesta(r);
}
async function apiDelete(ruta, code) {
  const r = await fetch(API_BASE + ruta, { method: "DELETE", headers: { "X-Code": code, "X-Password": currentPassword } });
  return parsearRespuesta(r);
}

async function cambiarPassword(code) {
  const actual = window.prompt("Tu contraseña actual (déjalo vacío si nunca has puesto una):") || "";
  const nueva = window.prompt("Nueva contraseña:");
  if (!nueva || !nueva.trim()) return;
  try {
    setCurrentPassword(actual);
    await apiPut("/password", code, { passwordActual: actual, passwordNueva: nueva.trim() });
    setCurrentPassword(nueva.trim());
    alert("✅ Contraseña actualizada");
  } catch (e) {
    alert("⚠️ " + e.message);
  }
}

const C = {
  earth: "#2C1810", roast: "#5C3A21", bark: "#8B5E3C", clay: "#C4956A",
  cream: "#F5EDD8", fog: "#EDE4D0", leaf: "#3A5C2A",
  mist: "#C8D9B5", alert: "#C0392B", warn: "#D4851A", ok: "#3A5C2A",
  white: "#FDFAF4",
};

// ── Referencias e indicadores ──────────────────────────────────────────────
// NOTA: esta función es una COPIA controlada (ver ADR-003 en specs/04_arquitectura.md)
// de la lógica de recomendaciones de diagnostico-finca-cafe/index.html. Si se ajustan
// los rangos ideales (Cenicafé/FNC/SCA) en una app, revisar también la otra.
const REF = {
  altitud:          { ideal: [1350, 1800], unidad: "msnm",  fuente: "Cenicafé" },
  puntajeSCA:       { ideal: [80, 100],    unidad: "pts",   fuente: "SCA" },
  pctRojos:         { ideal: [95, 100],    unidad: "%",     fuente: "Cenicafé" },
  fermentacion:     { ideal: [12, 24],     unidad: "h",     fuente: "Cenicafé" },
  humedadPergamino: { ideal: [10, 12],     unidad: "%",     fuente: "Cenicafé/FNC" },
  relacionCereza:   { ideal: [4.5, 5.5],   unidad: ":1",    fuente: "Cenicafé" },
  mermaTrilla:      { ideal: [17, 20],     unidad: "%",     fuente: "FNC" },
  pctPasilla:       { ideal: [0, 8],       unidad: "%",     fuente: "Cenicafé" },
  hrAlmacen:        { ideal: [60, 70],     unidad: "%HR",   fuente: "Cenicafé" },
};

function semaforo(campo, valor) {
  if (valor === "" || valor === null || valor === undefined) return null;
  const v = parseFloat(valor);
  if (isNaN(v)) return null;
  const r = REF[campo];
  if (!r) return null;
  const [lo, hi] = r.ideal;
  if (v >= lo && v <= hi) return "ok";
  const margen = (hi - lo) * 0.25;
  if (v >= lo - margen && v <= hi + margen) return "warn";
  return "alert";
}
const colorSem = s => s === "ok" ? C.ok : s === "warn" ? C.warn : s === "alert" ? C.alert : C.bark;
const iconSem  = s => s === "ok" ? "🟢" : s === "warn" ? "🟡" : s === "alert" ? "🔴" : "⚪";

function generarRecomendaciones(d) {
  const recs = [];
  const add = (p, area, titulo, texto, impacto) => recs.push({ prioridad: p, area, titulo, texto, impacto });

  const s_rojos = semaforo("pctRojos", d.pctRojos);
  if (s_rojos === "alert") add(1, "Cosecha", "Recolección selectiva urgente",
    `Tu proporción de frutos rojos (${d.pctRojos}%) está muy por debajo del 95% ideal. Cada fruto verde o sobremaduro genera defectos en cascada.`,
    "Alto impacto en calidad y merma");
  else if (s_rojos === "warn") add(2, "Cosecha", "Mejorar selectividad en cosecha",
    `Con ${d.pctRojos}% de frutos rojos estás cerca del límite. Una segunda pasada 5-7 días después suele elevar este porcentaje.`,
    "Impacto medio en calidad");

  const fv = parseFloat(d.fermentacion);
  const s_ferm = semaforo("fermentacion", d.fermentacion);
  if (s_ferm === "alert" && fv < 12) add(1, "Beneficio", "Fermentación insuficiente",
    `${d.fermentacion}h es poco. El mucílago no se degrada bien y puede generar notas terrosas o astringencia en taza.`,
    "Alto impacto en puntaje SCA");
  else if (s_ferm === "alert" && fv > 24) add(1, "Beneficio", "Sobrefermentación — riesgo crítico",
    `${d.fermentacion}h supera el rango seguro (12-24h). Genera notas vinosas que pueden restar puntos SCA.`,
    "Alto impacto en puntaje SCA");

  const hv = parseFloat(d.humedadPergamino);
  const s_hum = semaforo("humedadPergamino", d.humedadPergamino);
  if (s_hum === "alert" && hv > 12) add(1, "Secado", "Humedad excesiva — riesgo de hongos",
    `Con ${d.humedadPergamino}% el café está en zona de riesgo de hongos y pérdida de peso.`,
    "Alto impacto en merma y calidad");
  else if (s_hum === "alert" && hv < 10) add(2, "Secado", "Exceso de secado — pérdida evitable",
    `Con ${d.humedadPergamino}% estás secando de más. Cada punto por debajo del óptimo es peso vendible que se pierde.`,
    "Impacto medio en merma");

  const s_rel = semaforo("relacionCereza", d.relacionCereza);
  if (s_rel === "alert" && parseFloat(d.relacionCereza) > 5.5) add(2, "Cosecha + Beneficio", "Relación de conversión alta",
    `Necesitas ${d.relacionCereza} kg de cereza por 1 kg de pergamino (ideal 4,5-5,5:1).`,
    "Impacto directo en rentabilidad");

  const s_trilla = semaforo("mermaTrilla", d.mermaTrilla);
  if (s_trilla === "alert" && parseFloat(d.mermaTrilla) > 20) add(2, "Trilla", "Merma en trilla superior al estándar",
    `Con ${d.mermaTrilla}% de merma (estándar FNC: 19%) probablemente hay grano partido o defectos físicos previos.`,
    "Impacto medio en volumen vendible");

  const s_pas = semaforo("pctPasilla", d.pctPasilla);
  if (s_pas === "alert") add(2, "Trilla / Beneficio", "Porcentaje de pasilla alto",
    `${d.pctPasilla}% de pasilla supera el rango esperado (0-8%).`,
    "Impacto en ingresos netos");

  const s_hr = semaforo("hrAlmacen", d.hrAlmacen);
  if (s_hr === "alert" && parseFloat(d.hrAlmacen) > 70) add(2, "Almacenamiento", "Humedad relativa alta en bodega",
    `Con ${d.hrAlmacen}% de HR el café absorbe humedad y puede desarrollar hongos.`,
    "Impacto en pérdida de peso y calidad");

  const sv = parseFloat(d.puntajeSCA);
  if (d.puntajeSCA !== "" && sv < 80) add(1, "Calidad en taza", "Café fuera del rango de especialidad",
    `Con ${d.puntajeSCA} puntos el café no alcanza el umbral SCA (80 pts).`,
    "Crítico para acceder a precio premium");
  else if (d.puntajeSCA !== "" && sv >= 80 && sv < 84) add(2, "Calidad en taza", "Especialidad básico — hay margen de mejora",
    `Con ${d.puntajeSCA} puntos estás en especialidad básico. Mejoras de manejo pueden mover el puntaje a 84-86.`,
    "Impacto directo en precio de venta");

  return recs.sort((a, b) => a.prioridad - b.prioridad);
}

// ── Plan de acción: fusión de recomendaciones del diagnóstico con el plan guardado ──
function idRecomendacion(r) { return `${r.area}::${r.titulo}`.toLowerCase(); }

function nuevaAccionDesdeRecomendacion(r) {
  return {
    id: (crypto.randomUUID ? crypto.randomUUID() : idRecomendacion(r) + "-" + Date.now()),
    origenId: idRecomendacion(r),
    categoria: r.area,
    titulo: r.titulo,
    descripcion: r.texto,
    prioridad: r.prioridad === 1 ? "alta" : "media",
    responsable: "",
    plazo: "",
    costoEstimado: "",
    costoReal: "",
    estado: "pendiente",
    creadoEn: new Date().toISOString().slice(0, 10),
  };
}

function fusionarPlanConDiagnostico(diagDatos, accionesActuales) {
  const recs = generarRecomendaciones(diagDatos).filter(r => r.prioridad !== 0);
  const idsExistentes = new Set((accionesActuales || []).map(a => a.origenId).filter(Boolean));
  return recs.filter(r => !idsExistentes.has(idRecomendacion(r))).map(nuevaAccionDesdeRecomendacion);
}

// ── Objetivo, Ámbitos de mejora, Liderazgo y Recursos del plan ───────────────
const AMBITOS_DEF = [
  { id: "agricola", icono: "🌱", label: "Fases proceso agrícola",
    ayuda: "Piensa en cosecha, beneficio, secado o trilla: ¿qué etapa no está controlada hoy y qué cambio concreto quieres fijar?",
    placeholder: "Ej. Hoy la fermentación no se controla y varía entre 8 y 30 horas según el día, generando defectos. Se quiere fijar un protocolo de 12-24h." },
  { id: "finanzas", icono: "💵", label: "Finanzas",
    ayuda: "Piensa en lo que registras (o no) de costos e ingresos: ¿qué te falta llevar y para qué decisión te serviría?",
    placeholder: "Ej. Hoy no se registran los costos de producción por actividad. Se quiere llevar un control mensual en Finanzas Cafeteros para calcular el margen real." },
  { id: "comercializacion", icono: "📈", label: "Comercialización",
    ayuda: "Piensa en a quién le vendes y a qué precio hoy: ¿a qué quieres llegar (café especial, nuevo comprador, sello o certificación)?",
    placeholder: "Ej. Hoy el café se vende a precio convencional, sin trazabilidad. Se quiere alcanzar un puntaje SCA más alto para vender como café especial." },
];
const COLUMNAS_AMBITO = [
  { campo: "mejorarResultados", label: "Mejorar resultados actuales" },
  { campo: "mejorarProcesos", label: "Mejorar procesos actuales" },
  { campo: "alcanzarNuevosResultados", label: "Alcanzar nuevos resultados" },
  { campo: "implantarNuevosProcesos", label: "Implantar nuevos procesos" },
];
function nuevoAmbito(def) {
  return { id: def.id, descripcion: "", mejorarResultados: false, mejorarProcesos: false, alcanzarNuevosResultados: false, implantarNuevosProcesos: false };
}
// Completa un plan cargado del backend con los campos nuevos si todavía no los tiene
// (planes creados antes de esta función no los traen — el backend solo persiste lo que se le envía).
function normalizarPlan(p) {
  return {
    ...p,
    objetivo: p.objetivo || { cualitativo: "", cuantitativo: "" },
    ambitosMejora: (p.ambitosMejora && p.ambitosMejora.length === 3) ? p.ambitosMejora : AMBITOS_DEF.map(nuevoAmbito),
    liderazgo: p.liderazgo || { lidera: "", colabora: "" },
    recursos: p.recursos || [],
  };
}

const prioridadColor = p => p === "alta" ? C.alert : p === "media" ? C.warn : C.ok;
const prioridadIcon  = p => p === "alta" ? "🔴" : p === "media" ? "🟡" : "🟢";
const prioridadLabel = p => p === "alta" ? "Prioridad alta" : p === "media" ? "Prioridad media" : "Mantener";

const ESTADOS = [
  { id: "pendiente",   label: "Pendiente" },
  { id: "en_progreso", label: "En progreso" },
  { id: "completada",  label: "Completada" },
];

// ── COMPONENTES BASE ──────────────────────────────────────────────────────────

function IndicadorBar({ label, valor, campo }) {
  const s = semaforo(campo, valor);
  const r = REF[campo];
  if (valor === "" || valor === undefined) return null;
  return (
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "6px 0", borderBottom: `1px solid ${C.fog}` }}>
      <span style={{ fontSize: 12, color: C.earth, fontWeight: 600 }}>{iconSem(s)} {label}</span>
      <span style={{ fontSize: 12, color: colorSem(s), fontWeight: 700 }}>{valor} {r?.unidad || ""}</span>
    </div>
  );
}

function CampoTexto({ label, value, onChange, tipo = "text", placeholder }) {
  return (
    <div style={{ marginBottom: 10 }}>
      <label style={{ display: "block", fontSize: 11, fontWeight: 700, color: C.bark, marginBottom: 3 }}>{label}</label>
      <input
        type={tipo} value={value || ""} placeholder={placeholder || "—"}
        onChange={e => onChange(e.target.value)}
        style={{
          width: "100%", padding: "9px 10px", border: `1.5px solid ${C.clay}`,
          borderRadius: 8, fontSize: 14, background: C.white, color: C.earth, outline: "none",
        }}
      />
    </div>
  );
}

function CampoTextarea({ label, value, onChange, placeholder, ayuda, filas = 2 }) {
  return (
    <div style={{ marginBottom: 10 }}>
      <label style={{ display: "block", fontSize: 11, fontWeight: 700, color: C.bark, marginBottom: 3 }}>{label}</label>
      {ayuda && <p style={{ fontSize: 11, color: C.bark, marginBottom: 5, lineHeight: 1.45 }}>{ayuda}</p>}
      <textarea
        value={value || ""} placeholder={placeholder || "—"} rows={filas}
        onChange={e => onChange(e.target.value)}
        style={{
          width: "100%", padding: "9px 10px", border: `1.5px solid ${C.clay}`,
          borderRadius: 8, fontSize: 14, background: C.white, color: C.earth, outline: "none", resize: "vertical",
        }}
      />
    </div>
  );
}

// ── LOGIN (mismo código que diagnostico-finca-cafe / finanzas-cafeteros) ──────
function Login({ onLogin, codigoInicial, errorInicial }) {
  const [codigo, setCodigo] = useState(() => codigoInicial || new URLSearchParams(location.search).get("code")?.toUpperCase() || "");
  const [password, setPassword] = useState("");
  const [cargando, setCargando] = useState(false);
  const [error, setError] = useState(errorInicial || "");

  const entrar = async () => {
    const c = codigo.trim().toUpperCase();
    if (!c) { setError("Escribe tu código"); return; }
    setCargando(true); setError("");
    setCurrentPassword(password);
    try {
      const who = await apiGet("/whoami", c);
      onLogin(who);
    } catch (e) {
      setError(e.message === "Contraseña incorrecta" ? "⚠️ Contraseña incorrecta" : "Código no reconocido. Verifica con tu formador.");
      setCurrentPassword("");
    } finally { setCargando(false); }
  };

  return (
    <div style={{ minHeight: "100vh", background: C.cream, maxWidth: 480, margin: "0 auto",
      display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 24 }}>
      <div style={{ fontSize: 48, marginBottom: 8 }}>📋</div>
      <h1 style={{ fontSize: 20, fontWeight: 900, color: C.earth, marginBottom: 4, textAlign: "center" }}>Plan de Mejora de Calidad</h1>
      <p style={{ fontSize: 13, color: C.bark, marginBottom: 28, textAlign: "center" }}>Ubuntu Café · San Adolfo, Huila</p>
      <label style={{ display: "block", fontSize: 14, fontWeight: 700, color: C.earth, marginBottom: 8, alignSelf: "flex-start" }}>
        Tu código (el mismo del Diagnóstico y de Finanzas Cafeteros)
      </label>
      <input
        type="text" value={codigo} autoFocus
        onChange={e => { setCodigo(e.target.value); setError(""); }}
        onKeyDown={e => e.key === "Enter" && entrar()}
        placeholder="Ej. SA-01"
        style={{ width: "100%", padding: "13px 16px", border: `2px solid ${error ? C.alert : C.clay}`,
          borderRadius: 10, fontSize: 18, textAlign: "center", textTransform: "uppercase",
          background: C.white, color: C.earth, outline: "none", marginBottom: 10 }}
      />
      <label style={{ display: "block", fontSize: 12, fontWeight: 700, color: C.bark, marginBottom: 6, alignSelf: "flex-start" }}>
        Contraseña (si tu formador te asignó una)
      </label>
      <input
        type="password" value={password}
        onChange={e => { setPassword(e.target.value); setError(""); }}
        onKeyDown={e => e.key === "Enter" && entrar()}
        placeholder="Déjalo vacío si no tienes"
        style={{ width: "100%", padding: "13px 16px", border: `2px solid ${C.clay}`,
          borderRadius: 10, fontSize: 16, textAlign: "center",
          background: C.white, color: C.earth, outline: "none", marginBottom: 10 }}
      />
      {error && <p style={{ color: C.alert, fontSize: 13, marginBottom: 10 }}>{error}</p>}
      <button onClick={entrar} disabled={cargando} style={{
        width: "100%", borderRadius: 12, border: "none", padding: "14px 0",
        background: C.roast, color: C.cream, fontSize: 16, fontWeight: 900,
        opacity: cargando ? 0.7 : 1,
      }}>{cargando ? "Verificando…" : "Entrar →"}</button>
    </div>
  );
}

// ── TARJETA DE ACCIÓN (Kanban, con semáforo de prioridad) ─────────────────────
function TarjetaAccion({ accion, onCambiar, onEliminar, soloLectura }) {
  const manual = !accion.origenId;
  return (
    <div style={{ background: C.white, borderRadius: 12, padding: 14, marginBottom: 12,
      borderLeft: `4px solid ${prioridadColor(accion.prioridad)}`, boxShadow: "0 2px 6px rgba(0,0,0,0.08)" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
        <div style={{ fontSize: 10, fontWeight: 800, color: prioridadColor(accion.prioridad), marginBottom: 4, textTransform: "uppercase", letterSpacing: 0.6 }}>
          {prioridadIcon(accion.prioridad)} {prioridadLabel(accion.prioridad)} · {manual ? "Acción propia" : accion.categoria}
        </div>
        {!soloLectura && onEliminar && (
          <button onClick={() => onEliminar(accion.id)} style={{ background: "none", border: "none", color: C.bark, fontSize: 12, padding: 2 }}>✕</button>
        )}
      </div>

      {soloLectura || !manual ? (
        <div style={{ fontSize: 14, fontWeight: 800, color: C.earth, marginBottom: 6, lineHeight: 1.3 }}>{accion.titulo}</div>
      ) : (
        <CampoTexto label="¿Qué acción vas a hacer?" value={accion.titulo} onChange={v => onCambiar(accion.id, "titulo", v)} placeholder="Ej. Comprar termómetro para el secado" />
      )}

      {soloLectura ? (

// ── APP DEL CAFICULTOR ────────────────────────────────────────────────────────
function AppCaficultor({ code, onLogout }) {
  const [diagnostico, setDiagnostico] = useState(null);
  const [plan, setPlan] = useState(null);
  const [mensajes, setMensajes] = useState([]);
  const [cargado, setCargado] = useState(false);
  const [error, setError] = useState("");
  const [guardando, setGuardando] = useState(false);
  const [errorGuardado, setErrorGuardado] = useState(false);

  const cargarTodo = useCallback(() => {
    setError(""); setCargado(false);
    Promise.all([apiGet("/diagnostico", code), apiGet("/plan-accion", code), apiGet("/mensajes", code)])
      .then(([diagLista, planActual, msjs]) => {
        // Un código puede tener varios diagnósticos; el plan de acción reacciona al más reciente.
        const lista = diagLista?.diagnosticos || [];
        const diag = lista.length > 0 ? lista[lista.length - 1] : {};
        const nuevas = fusionarPlanConDiagnostico(diag, planActual.acciones);
        const planConAcciones = nuevas.length > 0 ? { ...planActual, acciones: [...planActual.acciones, ...nuevas] } : planActual;
        setDiagnostico(diag);
        setPlan(normalizarPlan(planConAcciones));
        setMensajes(msjs);
      })
      .catch(e => setError(e.message || "No se pudo conectar con el servidor"))
      .finally(() => setCargado(true));
  }, [code]);

  useEffect(() => { cargarTodo(); }, [cargarTodo]);

  const saveTimer = useRef(null);
  useEffect(() => {
    if (!cargado || !plan) return;
    setGuardando(true);
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => {
      apiPut("/plan-accion", code, plan)
        .then(() => setErrorGuardado(false))
        .catch(() => setErrorGuardado(true))
        .finally(() => setGuardando(false));
    }, 700);
    return () => clearTimeout(saveTimer.current);
  }, [plan, cargado, code]);

  const cambiarAccion = useCallback((id, campo, valor) => {
    setPlan(p => ({ ...p, acciones: p.acciones.map(a => a.id === id ? { ...a, [campo]: valor } : a) }));
  }, []);

  const agregarAccion = useCallback(() => {
    const nueva = {
      id: (crypto.randomUUID ? crypto.randomUUID() : "manual-" + Date.now()),
      origenId: null,
      categoria: "General",
      titulo: "",
      descripcion: "",
      prioridad: "media",
      responsable: "",
      plazo: "",
      costoEstimado: "",
      costoReal: "",
      estado: "pendiente",
      creadoEn: new Date().toISOString().slice(0, 10),
    };
    setPlan(p => ({ ...p, acciones: [...p.acciones, nueva] }));
  }, []);

  const eliminarAccion = useCallback((id) => {
    setPlan(p => ({ ...p, acciones: p.acciones.filter(a => a.id !== id) }));
  }, []);

  const cambiarObjetivo = useCallback((campo, valor) => {
    setPlan(p => ({ ...p, objetivo: { ...p.objetivo, [campo]: valor } }));
  }, []);

  const cambiarAmbito = useCallback((indice, campo, valor) => {
    setPlan(p => ({ ...p, ambitosMejora: p.ambitosMejora.map((a, i) => i === indice ? { ...a, [campo]: valor } : a) }));
  }, []);

  const cambiarLiderazgo = useCallback((campo, valor) => {
    setPlan(p => ({ ...p, liderazgo: { ...p.liderazgo, [campo]: valor } }));
  }, []);

  const cambiarRecurso = useCallback((indice, campo, valor) => {
    setPlan(p => ({ ...p, recursos: p.recursos.map((r, i) => i === indice ? { ...r, [campo]: valor } : r) }));
  }, []);

  const agregarRecurso = useCallback(() => {
    setPlan(p => ({ ...p, recursos: [...p.recursos, { id: (crypto.randomUUID ? crypto.randomUUID() : "recurso-" + Date.now()), tipo: "⏱ Tiempo", descripcion: "", cantidad: "" }] }));
  }, []);

  const eliminarRecurso = useCallback((indice) => {
    setPlan(p => ({ ...p, recursos: p.recursos.filter((_, i) => i !== indice) }));
  }, []);

  const descargarWordPlan = useCallback(async () => {
    try {
      const {
        Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell, WidthType,
        AlignmentType, BorderStyle, ShadingType, VerticalAlign, Footer, PageOrientation,
      } = window.docx;
      const fecha = new Date().toLocaleDateString("es-CO", { year: "numeric", month: "long", day: "numeric" });

      // Misma paleta y mismos textos que el mockup aprobado
      // (specs/mockups/plan-accion-word-a4-apaisado.html) y que el asistente en pantalla.
      const COL = { earth: "2C1810", roast: "5C3A21", bark: "8B5E3C", fog: "EDE4D0", bloque: "F5EDD8", fila: "FAF6EC", borde: "DDD5C4", alta: "C0392B", media: "D4851A", baja: "3A5C2A" };
      const colorPrioridad = p => p === "alta" ? COL.alta : p === "media" ? COL.media : COL.baja;
      const labelPrioridad = p => p === "alta" ? "Alta" : p === "media" ? "Media" : "Baja";
      const ESTADO_ESTILO = { pendiente: { bg: COL.fog, color: COL.roast }, en_progreso: { bg: "FCE3C0", color: "8A5A1E" }, completada: { bg: "DCEAD2", color: COL.baja } };

      const sinBordes = { top: { style: BorderStyle.NONE }, bottom: { style: BorderStyle.NONE }, left: { style: BorderStyle.NONE }, right: { style: BorderStyle.NONE } };
      const bordeFino = { style: BorderStyle.SINGLE, size: 4, color: COL.borde };
      const conBordes = { top: bordeFino, bottom: bordeFino, left: bordeFino, right: bordeFino };
      const celda = (texto, opts = {}) => new TableCell({
        width: opts.width ? { size: opts.width, type: WidthType.PERCENTAGE } : undefined,
        borders: opts.sinBorde ? sinBordes : conBordes,
        shading: opts.bg ? { type: ShadingType.SOLID, color: opts.bg } : undefined,
        verticalAlign: VerticalAlign.CENTER,
        margins: { top: 60, bottom: 60, left: 80, right: 80 },
        children: [new Paragraph({ alignment: opts.centro ? AlignmentType.CENTER : AlignmentType.LEFT, children: [new TextRun({ text: texto ?? "", bold: !!opts.bold, color: opts.color, size: opts.size || 18 })] })],
      });

      // ── Cabecera: ícono/título a la izquierda, código/fecha a la derecha ──
      const tablaCabecera = new Table({
        width: { size: 100, type: WidthType.PERCENTAGE },
        rows: [new TableRow({ children: [
          new TableCell({ borders: sinBordes, width: { size: 70, type: WidthType.PERCENTAGE }, children: [
            new Paragraph({ children: [new TextRun({ text: "☕ ", size: 32 }), new TextRun({ text: "Plan de Mejora de Calidad de Café", bold: true, size: 28, color: COL.earth })] }),
            new Paragraph({ children: [new TextRun({ text: "Ubuntu Café · San Adolfo, Huila", size: 18, color: COL.bark })] }),
          ] }),
          new TableCell({ borders: sinBordes, width: { size: 30, type: WidthType.PERCENTAGE }, verticalAlign: VerticalAlign.CENTER, children: [
            new Paragraph({ alignment: AlignmentType.RIGHT, children: [new TextRun({ text: "Código: ", size: 18, color: COL.bark }), new TextRun({ text: code, bold: true, size: 18, color: COL.earth })] }),
            new Paragraph({ alignment: AlignmentType.RIGHT, children: [new TextRun({ text: `Generado el ${fecha}`, size: 18, color: COL.bark })] }),
          ] }),
        ] })],
      });
      const lineaCabecera = new Paragraph({ spacing: { after: 200 }, border: { bottom: { style: BorderStyle.SINGLE, size: 18, color: COL.roast } }, children: [] });

      const tituloSeccion = texto => new Paragraph({ spacing: { after: 60 }, children: [new TextRun({ text: texto.toUpperCase(), bold: true, size: 16, color: COL.roast })] });
      const bloque = (titulo, parrafos) => new Table({
        width: { size: 100, type: WidthType.PERCENTAGE },
        rows: [new TableRow({ children: [new TableCell({
          borders: sinBordes, shading: { type: ShadingType.SOLID, color: COL.bloque }, margins: { top: 120, bottom: 120, left: 160, right: 160 },
          children: [tituloSeccion(titulo), ...parrafos],
        })] })],
      });
      const espacio = () => new Paragraph({ text: "", spacing: { after: 160 } });

      // ── Objetivo del plan ──
      const bloqueObjetivo = bloque("Objetivo del Plan", [
        new Paragraph({ spacing: { after: 60 }, children: [new TextRun({ text: "Cualitativo: ", bold: true, size: 20, color: COL.roast }), new TextRun({ text: plan.objetivo.cualitativo || "—", size: 20, color: COL.earth })] }),
        new Paragraph({ children: [new TextRun({ text: "Cuantitativo: ", bold: true, size: 20, color: COL.roast }), new TextRun({ text: plan.objetivo.cuantitativo || "—", size: 20, color: COL.earth })] }),
      ]);

      // ── Objetivos de mejora: misma matriz y mismas etiquetas de columna que en la app (COLUMNAS_AMBITO) ──
      const filasAmbitos = [
        new TableRow({ children: [
          celda("Ámbito", { bold: true, bg: COL.fog, color: COL.roast, width: 14, size: 16 }),
          celda("Descripción del objetivo", { bold: true, bg: COL.fog, color: COL.roast, width: 36, size: 16 }),
          ...COLUMNAS_AMBITO.map(c => celda(c.label, { bold: true, bg: COL.fog, color: COL.roast, width: 12.5, centro: true, size: 15 })),
        ] }),
        ...AMBITOS_DEF.map((def, i) => {
          const a = plan.ambitosMejora[i];
          return new TableRow({ children: [
            celda(`${def.icono} ${def.label}`, { bold: true, bg: "FAF6EC", color: COL.roast, width: 14, size: 16 }),
            celda(a.descripcion || "—", { width: 36, size: 16 }),
            ...COLUMNAS_AMBITO.map(c => celda(a[c.campo] ? "✓" : "", { width: 12.5, centro: true, color: COL.baja, bold: true })),
          ] });
        }),
      ];
      const bloqueAmbitos = [tituloSeccion("Objetivos de Mejora"), new Table({ width: { size: 100, type: WidthType.PERCENTAGE }, rows: filasAmbitos })];

      // ── Liderazgo + Recursos, lado a lado (igual que en el mockup) ──
      const filasRecursos = [
        new TableRow({ children: [celda("Tipo", { bold: true, bg: COL.fog, color: COL.roast, width: 28, size: 15 }), celda("Descripción", { bold: true, bg: COL.fog, color: COL.roast, width: 44, size: 15 }), celda("Cantidad", { bold: true, bg: COL.fog, color: COL.roast, width: 28, size: 15 })] }),
        ...(plan.recursos.length > 0 ? plan.recursos.map(r => new TableRow({ children: [celda(r.tipo, { width: 28, size: 16 }), celda(r.descripcion, { width: 44, size: 16 }), celda(r.cantidad, { width: 28, size: 16 })] })) : [new TableRow({ children: [celda("—", { width: 28 }), celda("Sin recursos definidos", { width: 44 }), celda("—", { width: 28 })] })]),
      ];
      const filaLiderazgoRecursos = new Table({
        width: { size: 100, type: WidthType.PERCENTAGE },
        rows: [new TableRow({ children: [
          new TableCell({ borders: sinBordes, width: { size: 35, type: WidthType.PERCENTAGE }, shading: { type: ShadingType.SOLID, color: COL.bloque }, margins: { top: 120, bottom: 120, left: 160, right: 160 }, children: [
            tituloSeccion("Liderazgo"),
            new Paragraph({ spacing: { after: 60 }, children: [new TextRun({ text: "Lidera: ", bold: true, size: 20, color: COL.roast }), new TextRun({ text: plan.liderazgo.lidera || "—", size: 20, color: COL.earth })] }),
            new Paragraph({ children: [new TextRun({ text: "Colabora: ", bold: true, size: 20, color: COL.roast }), new TextRun({ text: plan.liderazgo.colabora || "—", size: 20, color: COL.earth })] }),
          ] }),
          new TableCell({ borders: sinBordes, width: { size: 65, type: WidthType.PERCENTAGE }, shading: { type: ShadingType.SOLID, color: COL.bloque }, margins: { top: 120, bottom: 120, left: 160, right: 160 }, children: [
            tituloSeccion("Recursos Necesarios"),
            new Table({ width: { size: 100, type: WidthType.PERCENTAGE }, rows: filasRecursos }),
          ] }),
        ] })],
      });

      // ── Listado de tareas: cabecera oscura, filas alternas, prioridad y estado con el mismo color que en el Kanban ──
      const filasTareas = [
        new TableRow({ children: [celda("Prioridad", { bold: true, bg: COL.earth, color: "F5EDD8", width: 10, size: 16 }), celda("Categoría", { bold: true, bg: COL.earth, color: "F5EDD8", width: 14, size: 16 }), celda("Tarea", { bold: true, bg: COL.earth, color: "F5EDD8", width: 30, size: 16 }), celda("Responsable", { bold: true, bg: COL.earth, color: "F5EDD8", width: 16, size: 16 }), celda("Plazo", { bold: true, bg: COL.earth, color: "F5EDD8", width: 12, size: 16 }), celda("Estado", { bold: true, bg: COL.earth, color: "F5EDD8", width: 18, size: 16 })] }),
        ...(plan.acciones.length > 0 ? plan.acciones.map((a, i) => {
          const filaBg = i % 2 === 1 ? COL.fila : undefined;
          const est = ESTADO_ESTILO[a.estado] || ESTADO_ESTILO.pendiente;
          return new TableRow({ children: [
            celda(`● ${labelPrioridad(a.prioridad)}`, { width: 10, bg: filaBg, color: colorPrioridad(a.prioridad), bold: true }),
            celda(a.categoria || "—", { width: 14, bg: filaBg }),
            celda(a.titulo || "—", { width: 30, bg: filaBg }),
            celda(a.responsable || "—", { width: 16, bg: filaBg }),
            celda(a.plazo || "—", { width: 12, bg: filaBg }),
            celda(ESTADOS.find(e => e.id === a.estado)?.label || a.estado, { width: 18, bg: est.bg, color: est.color, bold: true, centro: true }),
          ] });
        }) : [new TableRow({ children: [celda("—", { width: 10 }), celda("—", { width: 14 }), celda("Sin tareas en el plan", { width: 30 }), celda("—", { width: 16 }), celda("—", { width: 12 }), celda("—", { width: 18 })] })]),
      ];

      const doc = new Document({
        sections: [{
          properties: { page: { size: { orientation: PageOrientation.LANDSCAPE }, margin: { top: 500, bottom: 500, left: 500, right: 500 } } },
          footers: { default: new Footer({ children: [new Table({
            width: { size: 100, type: WidthType.PERCENTAGE },
            rows: [new TableRow({ children: [
              new TableCell({ borders: sinBordes, width: { size: 50, type: WidthType.PERCENTAGE }, children: [new Paragraph({ children: [new TextRun({ text: "Comunidad San Adolfo (SA) · Programa Ubuntu Café", size: 16, color: COL.bark })] })] }),
              new TableCell({ borders: sinBordes, width: { size: 50, type: WidthType.PERCENTAGE }, children: [new Paragraph({ alignment: AlignmentType.RIGHT, children: [new TextRun({ text: "Referencias: Cenicafé · FNC · SCA", size: 16, color: COL.bark })] })] }),
            ] })],
          })] }) },
          children: [
            tablaCabecera, lineaCabecera,
            bloqueObjetivo, espacio(),
            ...bloqueAmbitos, espacio(),
            filaLiderazgoRecursos, espacio(),
            tituloSeccion("Listado de Tareas"),
            new Table({ width: { size: 100, type: WidthType.PERCENTAGE }, rows: filasTareas }),
          ],
        }],
      });

      const blob = await Packer.toBlob(doc);
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = `plan-mejora-${code}-${new Date().toISOString().slice(0, 10)}.docx`; a.click();
      URL.revokeObjectURL(url);
    } catch (e) { window.alert("No se pudo generar el documento Word: " + (e.message || e)); }
  }, [code, plan]);

  const borrarMiPlan = useCallback(async () => {
    if (!window.confirm("¿Seguro que quieres borrar TODO tu plan de acción? Esta acción no se puede deshacer.")) return;
    try {
      await apiDelete("/plan-accion", code);
      cargarTodo();
    } catch (e) {
      setErrorGuardado(true);
    }
  }, [code, cargarTodo]);

  if (!cargado) {
    return <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", color: C.bark }}>Cargando…</div>;
  }

  if (error || !diagnostico || !plan) {
    return (
      <div style={{ minHeight: "100vh", background: C.cream, maxWidth: 480, margin: "0 auto",
        display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 24, textAlign: "center" }}>
        <div style={{ fontSize: 40, marginBottom: 12 }}>⚠️</div>
        <p style={{ fontSize: 14, color: C.roast, lineHeight: 1.6, marginBottom: 20 }}>{error || "No se pudo cargar tu información."}</p>
        <button onClick={cargarTodo} style={{
          borderRadius: 12, border: "none", padding: "12px 24px",
          background: C.roast, color: C.cream, fontSize: 14, fontWeight: 900,
        }}>Reintentar</button>
        <span onClick={onLogout} style={{ fontSize: 12, color: C.bark, textDecoration: "underline", marginTop: 16 }}>Cambiar código</span>
      </div>
    );
  }

  return (
    <div style={{ minHeight: "100vh", background: C.cream, maxWidth: 600, margin: "0 auto" }}>
      <div className="header-safe" style={{ background: C.earth, padding: "4px 20px 16px", position: "sticky", top: 0, zIndex: 10 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ fontSize: 24 }}>📋</span>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 10, color: C.clay, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase" }}>Ubuntu Café · San Adolfo</div>
            <div style={{ fontSize: 16, color: C.cream, fontWeight: 900 }}>Mi Plan de Mejora</div>
          </div>
          <div style={{ textAlign: "right" }}>
            <div style={{ fontSize: 11, color: C.cream, fontWeight: 800, background: "#4A2A14", borderRadius: 6, padding: "3px 8px" }}>{code}</div>
            <div style={{ fontSize: 9, color: errorGuardado ? "#FF8A80" : C.clay, marginTop: 3 }}>
              {guardando ? "Guardando…" : errorGuardado ? "⚠ No se pudo guardar" : "✓ Guardado"}
            </div>
            <span onClick={() => cambiarPassword(code)} style={{ fontSize: 9, color: "#8B6B5A", textDecoration: "underline", marginRight: 6 }}>🔑 Contraseña</span>
            <span onClick={onLogout} style={{ fontSize: 9, color: "#8B6B5A", textDecoration: "underline" }}>Cambiar código</span>
          </div>
        </div>
      </div>

      <div className="scroll-area seccion" style={{ padding: "20px 16px 60px" }}>
        {/* Resumen de diagnóstico */}
        <h3 style={{ fontSize: 12, fontWeight: 900, color: C.roast, textTransform: "uppercase", letterSpacing: 1, marginBottom: 10 }}>Tu diagnóstico</h3>
        <div style={{ background: C.fog, borderRadius: 12, padding: "4px 14px", marginBottom: 24 }}>
          <IndicadorBar label="Frutos rojos en cosecha" valor={diagnostico.pctRojos} campo="pctRojos" />
          <IndicadorBar label="Puntaje SCA" valor={diagnostico.puntajeSCA} campo="puntajeSCA" />
          <IndicadorBar label="Fermentación" valor={diagnostico.fermentacion} campo="fermentacion" />
          <IndicadorBar label="Merma en trilla" valor={diagnostico.mermaTrilla} campo="mermaTrilla" />
          <IndicadorBar label="% pasilla" valor={diagnostico.pctPasilla} campo="pctPasilla" />
        </div>
        {!diagnostico.actualizadoEn && (
          <div style={{ fontSize: 12, color: C.bark, marginTop: -16, marginBottom: 20 }}>
            Aún no completas tu Diagnóstico de Finca. No es obligatorio para tener un plan — puedes añadir tus propias acciones abajo — pero al completarlo, el plan se completa automáticamente con recomendaciones.
          </div>
        )}

        {/* Objetivo del plan */}
        <h3 style={{ fontSize: 12, fontWeight: 900, color: C.roast, textTransform: "uppercase", letterSpacing: 1, marginBottom: 10 }}>Objetivo del plan</h3>
        <div style={{ marginBottom: 24 }}>
          <SeccionObjetivo objetivo={plan.objetivo} onCambiar={cambiarObjetivo} soloLectura={false} />
        </div>

        {/* Objetivos de mejora (matriz por ámbito) */}
        <h3 style={{ fontSize: 12, fontWeight: 900, color: C.roast, textTransform: "uppercase", letterSpacing: 1, marginBottom: 10 }}>Objetivos de mejora</h3>
        <div style={{ marginBottom: 24 }}>
          <SeccionAmbitos ambitos={plan.ambitosMejora} onCambiar={cambiarAmbito} soloLectura={false} />
        </div>

        {/* Liderazgo */}
        <h3 style={{ fontSize: 12, fontWeight: 900, color: C.roast, textTransform: "uppercase", letterSpacing: 1, marginBottom: 10 }}>Liderazgo</h3>
        <div style={{ marginBottom: 24 }}>
          <SeccionLiderazgo liderazgo={plan.liderazgo} onCambiar={cambiarLiderazgo} soloLectura={false} />
        </div>

        {/* Recursos necesarios */}
        <h3 style={{ fontSize: 12, fontWeight: 900, color: C.roast, textTransform: "uppercase", letterSpacing: 1, marginBottom: 10 }}>Recursos necesarios</h3>
        <div style={{ marginBottom: 24 }}>
          <SeccionRecursos recursos={plan.recursos} onCambiar={cambiarRecurso} onAgregar={agregarRecurso} onEliminar={eliminarRecurso} soloLectura={false} />
        </div>

        {/* Kanban del plan */}
        <h3 style={{ fontSize: 12, fontWeight: 900, color: C.roast, textTransform: "uppercase", letterSpacing: 1, marginBottom: 10 }}>Tu plan de acción</h3>
        <Kanban acciones={plan.acciones} onCambiar={cambiarAccion} onEliminar={eliminarAccion} onAgregar={agregarAccion} soloLectura={false} />

        {/* Mensajes del formador */}
        <h3 style={{ fontSize: 12, fontWeight: 900, color: C.roast, textTransform: "uppercase", letterSpacing: 1, margin: "24px 0 10px" }}>Mensajes de tu formador</h3>
        {mensajes.length === 0 && <div style={{ fontSize: 13, color: C.bark }}>Sin mensajes por ahora.</div>}
        {mensajes.map(m => <TarjetaMensaje key={m.id} m={m} />)}

        {/* Imprimir / descargar */}
        <button onClick={() => window.print()} style={{
          width: "100%", marginTop: 20, borderRadius: 12, border: "none", padding: "14px 0",
          background: C.roast, color: C.cream, fontSize: 15, fontWeight: 900,
        }}>🖨️ Imprimir mi plan</button>
        <button onClick={descargarWordPlan} style={{
          width: "100%", marginTop: 10, borderRadius: 12, border: `1.5px solid ${C.roast}`, padding: "13px 0",
          background: "transparent", color: C.roast, fontSize: 14, fontWeight: 900,
        }}>📄 Descargar mi plan en Word</button>

        {/* Borrar mis datos */}
        <button onClick={borrarMiPlan} style={{
          width: "100%", marginTop: 10, borderRadius: 12, border: `1.5px solid ${C.alert}`, padding: "12px 0",
          background: "transparent", color: C.alert, fontSize: 13, fontWeight: 800,
        }}>🗑 Borrar mi plan de acción</button>
      </div>

      <VistaImpresion code={code} diagnostico={diagnostico} acciones={plan.acciones} />
    </div>
  );
}

// ── PANEL DEL FORMADOR ────────────────────────────────────────────────────────
function PanelFormador({ code, comunidad, onLogout }) {
  const [planes, setPlanes] = useState([]);
  const [diagnosticos, setDiagnosticos] = useState([]);
  const [mensajes, setMensajes] = useState([]);
  const [cargado, setCargado] = useState(false);
  const [error, setError] = useState("");
  const [seleccionado, setSeleccionado] = useState(null);
  const [form, setForm] = useState({ destinatario: "todos", tipo: "comentario", titulo: "", texto: "", enlace: "" });
  const [enviando, setEnviando] = useState(false);

  const cargar = useCallback(() => {
    setError("");
    Promise.all([apiGet("/admin/plan-accion", code), apiGet("/admin/diagnostico", code), apiGet("/admin/mensajes", code)])
      .then(([p, d, m]) => { setPlanes(p); setDiagnosticos(d); setMensajes(m); })
      .catch(e => setError(e.message || "No se pudo conectar con el servidor"))
      .finally(() => setCargado(true));
  }, [code]);

  useEffect(() => { cargar(); }, [cargar]);

  // Cada código puede tener varios diagnósticos; el panel del formador muestra el más reciente.
  const diagPorCodigo = useMemo(() => Object.fromEntries(diagnosticos.map(p => {
    const lista = p.diagnosticos || [];
    return [p.codigo, lista.length > 0 ? lista[lista.length - 1] : null];
  })), [diagnosticos]);

  const resumen = (plan) => {
    const a = plan.acciones || [];
    return { total: a.length, completadas: a.filter(x => x.estado === "completada").length };
  };

  const enviarMensaje = async () => {
    if (!form.titulo && !form.texto) return;
    setEnviando(true);
    try {
      await apiPost("/admin/mensaje", code, form);
      setForm({ destinatario: "todos", tipo: "comentario", titulo: "", texto: "", enlace: "" });
      cargar();
    } catch (e) { /* silencioso, MVP */ }
    finally { setEnviando(false); }
  };

  const borrarMensaje = async (id) => {
    await apiDelete(`/admin/mensaje/${id}`, code).catch(() => {});
    cargar();
  };

  const borrarPlanCaficultor = async (codigo) => {
    if (!window.confirm(`¿Borrar TODO el plan de acción de ${codigo}? Esta acción no se puede deshacer.`)) return;
    await apiDelete(`/admin/plan-accion/${codigo}`, code).catch(() => {});
    cargar();
  };

  const borrarDiagnosticoCaficultor = async (codigo) => {
    if (!window.confirm(`¿Borrar el diagnóstico de finca de ${codigo}? Esta acción no se puede deshacer.`)) return;
    await apiDelete(`/admin/diagnostico/${codigo}`, code).catch(() => {});
    cargar();
  };

  if (!cargado) {
    return <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", color: C.bark }}>Cargando…</div>;
  }

  if (error) {
    return (
      <div style={{ minHeight: "100vh", background: C.cream, maxWidth: 480, margin: "0 auto",
        display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 24, textAlign: "center" }}>
        <div style={{ fontSize: 40, marginBottom: 12 }}>⚠️</div>
        <p style={{ fontSize: 14, color: C.roast, lineHeight: 1.6, marginBottom: 20 }}>{error}</p>
        <button onClick={cargar} style={{
          borderRadius: 12, border: "none", padding: "12px 24px",
          background: C.roast, color: C.cream, fontSize: 14, fontWeight: 900,
        }}>Reintentar</button>
        <span onClick={onLogout} style={{ fontSize: 12, color: C.bark, textDecoration: "underline", marginTop: 16 }}>Cambiar código</span>
      </div>
    );
  }

  return (
    <div style={{ minHeight: "100vh", background: C.cream, maxWidth: 600, margin: "0 auto" }}>
      <div className="header-safe" style={{ background: C.earth, padding: "4px 20px 16px" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ fontSize: 24 }}>👥</span>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 10, color: C.clay, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase" }}>Ubuntu Café · {comunidad}</div>
            <div style={{ fontSize: 16, color: C.cream, fontWeight: 900 }}>Panel del Formador</div>
          </div>
          <span onClick={() => cambiarPassword(code)} style={{ fontSize: 9, color: "#8B6B5A", textDecoration: "underline", marginRight: 6 }}>🔑 Contraseña</span>
          <span onClick={onLogout} style={{ fontSize: 9, color: "#8B6B5A", textDecoration: "underline" }}>Salir</span>
        </div>
      </div>

      <div className="scroll-area seccion" style={{ padding: "20px 16px 60px" }}>
        <h3 style={{ fontSize: 12, fontWeight: 900, color: C.roast, textTransform: "uppercase", letterSpacing: 1, marginBottom: 10 }}>Caficultores ({planes.length})</h3>
        {planes.map(plan => {
          const r = resumen(plan);
          const diag = diagPorCodigo[plan.codigo];
          return (
            <div key={plan.codigo}>
              <button onClick={() => setSeleccionado(s => s === plan.codigo ? null : plan.codigo)} style={{
                width: "100%", display: "flex", justifyContent: "space-between", alignItems: "center",
                background: C.white, borderRadius: 10, padding: "12px 14px", marginBottom: 6, border: "none",
              }}>
                <span style={{ fontSize: 14, fontWeight: 800, color: C.earth }}>{plan.codigo}</span>
                <span style={{ fontSize: 11, color: C.bark }}>
                  {diag?.puntajeSCA ? `SCA ${diag.puntajeSCA} · ` : ""}{r.completadas}/{r.total} acciones completadas
                </span>
              </button>
              {seleccionado === plan.codigo && (
                <DetalleCaficultorFormador codigo={plan.codigo} diagnostico={diag} plan={plan} onBorrarPlan={borrarPlanCaficultor} onBorrarDiagnostico={borrarDiagnosticoCaficultor} />
              )}
            </div>
          );
        })}

        <h3 style={{ fontSize: 12, fontWeight: 900, color: C.roast, textTransform: "uppercase", letterSpacing: 1, margin: "28px 0 10px" }}>Enviar mensaje</h3>
        <div style={{ background: C.white, borderRadius: 12, padding: 14, marginBottom: 20 }}>
          <label style={{ display: "block", fontSize: 11, fontWeight: 700, color: C.bark, marginBottom: 3 }}>Destinatario</label>
          <select value={form.destinatario} onChange={e => setForm(f => ({ ...f, destinatario: e.target.value }))}
            style={{ width: "100%", padding: "9px 10px", borderRadius: 8, border: `1.5px solid ${C.clay}`, marginBottom: 10, background: C.white }}>
            <option value="todos">Toda la comunidad</option>
            {planes.map(p => <option key={p.codigo} value={p.codigo}>{p.codigo}</option>)}
          </select>
          <label style={{ display: "block", fontSize: 11, fontWeight: 700, color: C.bark, marginBottom: 3 }}>Tipo</label>
          <select value={form.tipo} onChange={e => setForm(f => ({ ...f, tipo: e.target.value }))}
            style={{ width: "100%", padding: "9px 10px", borderRadius: 8, border: `1.5px solid ${C.clay}`, marginBottom: 10, background: C.white }}>
            <option value="comentario">💬 Comentario</option>
            <option value="documento">📄 Documento</option>
            <option value="enlace">🔗 Enlace</option>
          </select>
          <CampoTexto label="Título" value={form.titulo} onChange={v => setForm(f => ({ ...f, titulo: v }))} placeholder="Ej. Sigue así con la fermentación" />
          <div style={{ marginBottom: 10 }}>
            <label style={{ display: "block", fontSize: 11, fontWeight: 700, color: C.bark, marginBottom: 3 }}>Texto</label>
            <textarea value={form.texto} onChange={e => setForm(f => ({ ...f, texto: e.target.value }))} rows={3}
              style={{ width: "100%", padding: "9px 10px", borderRadius: 8, border: `1.5px solid ${C.clay}`, background: C.white, resize: "vertical" }} />
          </div>
          <CampoTexto label="Enlace (opcional — PDF, video, imagen)" value={form.enlace} onChange={v => setForm(f => ({ ...f, enlace: v }))} placeholder="https://..." />
          <button onClick={enviarMensaje} disabled={enviando} style={{
            width: "100%", borderRadius: 10, border: "none", padding: "12px 0",
            background: C.leaf, color: C.cream, fontSize: 14, fontWeight: 900, opacity: enviando ? 0.7 : 1,
          }}>{enviando ? "Enviando…" : "Enviar mensaje"}</button>
        </div>

        <h3 style={{ fontSize: 12, fontWeight: 900, color: C.roast, textTransform: "uppercase", letterSpacing: 1, marginBottom: 10 }}>Mensajes enviados</h3>
        {mensajes.length === 0 && <div style={{ fontSize: 13, color: C.bark }}>Ningún mensaje enviado todavía.</div>}
        {mensajes.map(m => <TarjetaMensaje key={m.id} m={m} onBorrar={borrarMensaje} />)}
      </div>
    </div>
  );
}

// ── APP raíz: gestiona el código guardado en este dispositivo ────────────────
function App() {
  const [code, setCode] = useState(() => localStorage.getItem("pmcc_code") || "");
  const [who, setWho] = useState(null);
  const [verificando, setVerificando] = useState(false);
  const [errorReautenticacion, setErrorReautenticacion] = useState("");

  useEffect(() => {
    if (!code) { setWho(null); return; }
    setVerificando(true);
    apiGet("/whoami", code).then(setWho).catch(e => {
      setWho(null);
      if (e.message === "Contraseña incorrecta") {
        // No se borra el código: se deja que vuelva a entrar con la contraseña correcta sin perder de vista cuál era su código.
        setCurrentPassword("");
        setErrorReautenticacion("Tu contraseña no coincide (puede que el formador la haya cambiado). Vuelve a entrar.");
      } else {
        localStorage.removeItem("pmcc_code");
        localStorage.removeItem("pmcc_password");
        setCode("");
      }
    }).finally(() => setVerificando(false));
  }, [code]);

  const onLogin = (w) => { localStorage.setItem("pmcc_code", w.code); setCode(w.code); setWho(w); setErrorReautenticacion(""); };
  const onLogout = () => { localStorage.removeItem("pmcc_code"); localStorage.removeItem("pmcc_password"); setCurrentPassword(""); setCode(""); setWho(null); setErrorReautenticacion(""); };

  if (!code || errorReautenticacion) return <Login onLogin={onLogin} codigoInicial={code} errorInicial={errorReautenticacion} />;
  if (verificando || !who) return <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", color: C.bark }}>Cargando…</div>;

  return who.role === "formador"
    ? <PanelFormador code={who.code} comunidad={who.comunidad} onLogout={onLogout} />
    : <AppCaficultor code={who.code} onLogout={onLogout} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
